name: Benchmarks

on:
    workflow_dispatch:

permissions:
    contents: write

jobs:
    bench:
        name: Run benchmarks
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v6
              with:
                  persist-credentials: true
                  token: ${{ secrets.SR_TOKEN }}

            - name: Cache dependencies
              uses: actions/cache@v5
              with:
                  path: '**/node_modules'
                  key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}

            - name: Install Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Run benchmarks and write report
              env:
                  BENCH_PUBLISH: '1'
              run: |
                  bun run bench:publish
                  bun run format

            - name: Commit benchmarks
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  git add BENCHMARKS.md
                  git commit -m "chore(bench): update benchmarks [skip ci]" || echo "no changes to commit"
                  git push
