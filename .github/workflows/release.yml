name: Release

on:
    workflow_dispatch:
    push:
        branches:
            - main
            - dev

permissions:
    id-token: write
    contents: write
    pages: write

concurrency:
    group: pages
    cancel-in-progress: false

jobs:
    release:
        name: Release
        runs-on: ubuntu-latest
        if: github.ref == 'refs/heads/main'

        steps:
            - name: Checkout
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0
                  persist-credentials: true
                  token: ${{ secrets.SR_TOKEN }}

            - name: Cache dependencies
              uses: actions/cache@v5
              with:
                  path: '**/node_modules'
                  key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}

            - name: Install Node.js # required for tsdown, see https://github.com/rolldown/tsdown/releases/tag/v0.22.0
              uses: actions/setup-node@v6
              with:
                  node-version: 24

            - name: Install Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Type check
              run: bun run typecheck

            - name: Run tests
              run: bun run test

            - name: Build
              run: bun run build

            - name: Get previous version
              id: prev
              run: echo "version=$(bun pm pkg get version | tr -d '"')" >> $GITHUB_OUTPUT

            - name: Semantic release
              env:
                  GITHUB_TOKEN: ${{ secrets.SR_TOKEN }}
              run: bun run release

            - name: Get new version
              id: next
              run: echo "version=$(bun pm pkg get version | tr -d '"')" >> $GITHUB_OUTPUT

            - name: Run benchmarks
              if: steps.prev.outputs.version != steps.next.outputs.version
              run: bun run bench:publish

            - name: Build docs
              if: steps.prev.outputs.version != steps.next.outputs.version
              run: bun run docs:build

            - name: Format
              if: steps.prev.outputs.version != steps.next.outputs.version
              run: bun run format

            - name: Commit generated files
              if: steps.prev.outputs.version != steps.next.outputs.version
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  git add BENCHMARKS.md
                  git commit -m "chore: update benchmarks for v${{ steps.next.outputs.version }} [skip ci]" || echo "no changes to commit"
                  git add docs/api
                  git commit -m "chore: update API docs for v${{ steps.next.outputs.version }} [skip ci]" || echo "no changes to commit"
                  git push

            - name: Setup GitHub Pages
              if: steps.prev.outputs.version != steps.next.outputs.version
              uses: actions/configure-pages@v6

            - name: Upload GitHub Pages artifact
              if: steps.prev.outputs.version != steps.next.outputs.version
              uses: actions/upload-pages-artifact@v5
              with:
                  path: docs/.vitepress/dist

            - name: Deploy to GitHub Pages
              if: steps.prev.outputs.version != steps.next.outputs.version
              uses: actions/deploy-pages@v5

    canary:
        name: Canary Release
        runs-on: ubuntu-latest
        if: github.ref == 'refs/heads/dev'

        steps:
            - name: Checkout
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0
                  persist-credentials: true
                  token: ${{ secrets.SR_TOKEN }}

            - name: Cache dependencies
              uses: actions/cache@v5
              with:
                  path: '**/node_modules'
                  key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}

            - name: Install Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 24

            - name: Install Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Type check
              run: bun run typecheck

            - name: Run tests
              run: bun run test

            - name: Build
              run: bun run build

            - name: Semantic release
              env:
                  GITHUB_TOKEN: ${{ secrets.SR_TOKEN }}
              run: bun run release
