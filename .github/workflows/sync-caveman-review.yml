name: Sync Caveman Review skill

on:
    schedule:
        - cron: '0 0 1 * *'
    workflow_dispatch:

permissions:
    contents: write

jobs:
    sync-file:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Fetch upstream file
              run: |
                  mkdir -p .github
                  curl -fsSL "https://raw.githubusercontent.com/JuliusBrussee/caveman/main/skills/caveman-review/SKILL.md" -o .github/copilot-instructions.md

            - name: Commit and push
              run: |
                  git config --global user.name "github-actions[bot]"
                  git config --global user.email "github-actions[bot]@users.noreply.github.com"
                  git add .github/copilot-instructions.md

                  if ! git diff --staged --quiet; then
                    git commit -m "chore: automatically sync Caveman Review skill from upstream"
                    git push
                  fi
